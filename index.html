<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌷flower samples 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #f7bba6, #8f5365);
}

.hero img { width: 100%; }

.header h1 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    font-size: 48px;
    color: #ffffff;
}

/* ✅ แถวเดียวทั้งหมด */
.gallery {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

.card {
    background: white;
    border-radius: 25px;
    padding: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 20px;
    cursor: pointer;
}

.title {
    margin-top: 10px;
    color: #ff4d88;
    font-weight: bold;
    text-align: center;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img {
  max-width: 90%;
  max-height: 70%;
  border-radius: 20px;
}

#modal-text {
  color: white;
  margin-top: 15px;
  text-align: center;
  background: rgba(255,255,255,0.1);
  padding: 12px 20px;
  border-radius: 15px;
  white-space: pre-line;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

.nav {
  position: absolute;
  top: 50%;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<body>

<section class="hero">
  <img src="ปก.png">
</section>

<div class="header">
    <h1>flowers samples</h1>
</div>

<div class="gallery">

<div class="card"><img src="AD Facebook-01.png" class="clickable" data-info="💧 รดน้ำวันเว้นวัน\n🌤 แดดรำไร\n❄ ชอบอากาศเย็น"><div class="title">ไฮเดรนเยีย 🌷</div></div>

<div class="card"><img src="AD Facebook-02.png" class="clickable" data-info="💧 รดน้ำทุกวัน\n🌤 แดดอ่อน\n🌬 อากาศถ่ายเท"><div class="title">โคมญี่ปุ่น 🌷</div></div>

<div class="card"><img src="AD Facebook-11.png" class="clickable" data-info="💧 รดน้ำปานกลาง\n☀ แดดครึ่งวัน\n🌼 ดูแลง่าย"><div class="title">บลูเดซี่ 🌷</div></div>

<div class="card"><img src="AD Facebook-12.png" class="clickable" data-info="💧 รดน้ำ 2-3 วัน/ครั้ง\n🌤 แดดรำไร\n🌿 ชอบความชื้น"><div class="title">เฟิร์นข้าหลวง 🌷</div></div>

<div class="card"><img src="AD Facebook-14.png" class="clickable" data-info="💧 รดน้ำทุกวัน\n☀ แดดอ่อนถึงกลาง\n🌸 ออกดอกบ่อย"><div class="title">บีโกเนีย 🌷</div></div>

</div>

<div style="text-align:center;">
<a href="https://lin.ee/55ELDCZ" target="_blank" class="btn">🌷 แอดไลน์สั่งงานเลย</a>
</div>

<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <span class="nav prev" onclick="changeSlide(-1)">❮</span>
  <img id="modal-img">
  <div id="modal-text"></div>
  <span class="nav next" onclick="changeSlide(1)">❯</span>
</div>

<script>
let images = [];
let infos = [];
let currentIndex = 0;

const allImgs = document.querySelectorAll(".clickable");

allImgs.forEach((img, index) => {
    images.push(img.src);
    infos.push(img.dataset.info);

    img.addEventListener("click", () => {
        openModal(index);
    });
});

function openModal(index) {
  currentIndex = index;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-img").src = images[currentIndex];
  document.getElementById("modal-text").innerText = infos[currentIndex];
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function changeSlide(step) {
  currentIndex += step;

  if (currentIndex < 0) currentIndex = images.length - 1;
  if (currentIndex >= images.length) currentIndex = 0;

  document.getElementById("modal-img").src = images[currentIndex];
  document.getElementById("modal-text").innerText = infos[currentIndex];
}
</script>

</body>
</html>
